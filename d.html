<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем бронебойную библиотеку -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    
    <style>
        body { 
            margin: 0; padding: 0; background: #ffffff; 
            overflow: hidden; touch-action: none; 
            display: flex; flex-direction: column; align-items: center; 
        }
        /* Обертка нужна, чтобы библиотека правильно считала координаты */
        .wrapper {
            position: relative;
            width: 100vw;
            height: 100vw;
            background: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            touch-action: none;
        }
        canvas { 
            width: 100%; height: 100%; 
            display: block; touch-action: none; 
        }
        #clear-btn { 
            position: fixed; top: 15px; right: 15px; 
            padding: 10px 20px; background: #ff4444; color: #fff; 
            border: none; border-radius: 10px; font-weight: bold; z-index: 100; 
        }
        #status { margin-top: 20px; color: #888; font-family: sans-serif; font-size: 14px; }
    </style>
</head>
<body>
    <button id="clear-btn">Очистить</button>
    <div class="wrapper">
        <canvas id="canvas"></canvas>
    </div>
    <div id="status">Нарисуй что-нибудь ❤️</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('canvas');

        // 1. Правильная настройка резкости для Андроидов
        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }
        window.onresize = resizeCanvas;
        resizeCanvas();

        // 2. Инициализация бронебойной библиотеки
        const signaturePad = new SignaturePad(canvas, {
            minWidth: 4,
            maxWidth: 10,
            penColor: "#ff4081",
            velocityFilterWeight: 0.7 // Делает линию более живой (как маркер)
        });

        // Очистка
        document.getElementById('clear-btn').addEventListener('click', function () {
            signaturePad.clear();
        });

        // 3. Форматируем и отправляем (Сжатие для анимации)
        tg.MainButton.setText("ОТПРАВИТЬ АНИМАЦИЮ ❤️");
        tg.MainButton.show();
        
        tg.MainButton.onClick(() => {
            if (signaturePad.isEmpty()) {
                return alert("Сначала нарисуй что-нибудь!");
            }

            // Достаем "сырые" координаты из библиотеки
            const pointGroups = signaturePad.toData();
            
            // Сжимаем их в нашу HEX-строку (0-255)
            let compressedData = "";
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;

            for (const group of pointGroups) {
                // Маркер нового мазка
                let stroke = "!";
                for (let i = 0; i < group.points.length; i++) {
                    // Оптимизация: берем не каждую точку, а через одну (кроме начала и конца)
                    if (i % 2 !== 0 && i !== 0 && i !== group.points.length - 1) continue;
                    
                    const pt = group.points[i];
                    // Переводим в формат 0-255
                    const x = Math.max(0, Math.min(255, Math.round((pt.x / width) * 255)));
                    const y = Math.max(0, Math.min(255, Math.round((pt.y / height) * 255)));
                    
                    stroke += x.toString(16).padStart(2, '0') + y.toString(16).padStart(2, '0');
                }
                compressedData += stroke;
            }

            if (compressedData.length > 4000) {
                return alert("Рисунок слишком сложный! Попробуй нарисовать чуть проще.");
            }
            
            tg.sendData(compressedData);
        });
    </script>
</body>
</html>
