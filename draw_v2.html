<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #fff; touch-action: none; }
        /* Холст занимает ровно 100% ширины экрана, образуя квадрат */
        canvas { display: block; width: 100vw; height: 100vw; background: #fff; touch-action: none; }
        #clear-btn { position: fixed; top: 15px; right: 15px; padding: 12px 20px; background: #ff4444; color: #fff; border: none; border-radius: 10px; font-weight: bold; z-index: 100; }
        #bar { position: fixed; top: 0; left: 0; height: 5px; background: #ff4081; width: 0%; z-index: 200; }
    </style>
</head>
<body>
    <div id="bar"></div>
    <button id="clear-btn">Очистить</button>
    <canvas id="canvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 1. ИДЕАЛЬНОЕ РАЗРЕШЕНИЕ: 1 пиксель холста = 1 пиксель экрана
        const size = window.innerWidth;
        canvas.width = size;
        canvas.height = size;

        // Кисть адаптируется под размер экрана телефона
        ctx.strokeStyle = '#ff4081';
        ctx.lineWidth = size / 35; 
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        let drawing = false;
        let data = "";
        let lastCx = -1, lastCy = -1;

        // 2. ФУНКЦИЯ СЖАТИЯ (переводит реальные пиксели экрана в формат 0-255 для бота)
        function compress(val) {
            let v = Math.max(0, Math.min(255, Math.round((val / size) * 255)));
            return v.toString(16).padStart(2, '0');
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function start(e) {
            e.preventDefault(); // ГЛАВНОЕ ПРАВИЛО АНДРОИДА: глушим скролл
            drawing = true;
            const {x, y} = getPos(e);
            
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + 0.1, y + 0.1); // Рисуем точку от простого касания
            ctx.stroke();

            let cx = compress(x), cy = compress(y);
            data += "!" + cx + cy;
            lastCx = cx; lastCy = cy;
        }

        function move(e) {
            e.preventDefault(); // Глушим скролл
            if (!drawing) return;
            const {x, y} = getPos(e);
            
            ctx.lineTo(x, y);
            ctx.stroke();

            let cx = compress(x), cy = compress(y);
            // Оптимизация: пишем в строку только если сжатая координата изменилась
            if (cx !== lastCx || cy !== lastCy) {
                data += cx + cy;
                lastCx = cx; lastCy = cy;
                document.getElementById('bar').style.width = (data.length / 4000 * 100) + "%";
            }
        }

        function stop(e) {
            e.preventDefault();
            drawing = false;
        }

        // 3. ВЕШАЕМ СЛУШАТЕЛИ ЖЕСТКО С passive: false (Бронебойно для Android)
        canvas.addEventListener('touchstart', start, {passive: false});
        canvas.addEventListener('touchmove', move, {passive: false});
        canvas.addEventListener('touchend', stop, {passive: false});
        canvas.addEventListener('touchcancel', stop, {passive: false});

        // Для проверки с ПК
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);

        document.getElementById('clear-btn').onclick = () => {
            ctx.clearRect(0, 0, size, size);
            data = "";
            document.getElementById('bar').style.width = "0%";
        };

        tg.MainButton.setText("ОТПРАВИТЬ ЛАВ ❤️");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            if (data.length < 5) return alert("Нарисуй что-нибудь!");
            if (data.length > 4000) return alert("Слишком длинный рисунок!");
            tg.sendData(data);
        });
    </script>
</body>
</html>
