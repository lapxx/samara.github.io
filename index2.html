<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Жесткая блокировка всех системных жестов смартфона */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none; /* Отключает скролл и зум полностью */
        }
        body { 
            margin: 0; padding: 0; background: #ffffff; 
            overflow: hidden; font-family: sans-serif; 
        }
        canvas { 
            display: block; 
            background: #ffffff; 
            width: 100vw; 
            height: 100vw; 
            touch-action: none;
        }
        #clear-btn { 
            position: fixed; top: 15px; right: 15px; 
            padding: 12px 20px; background: #ff4444; color: #fff; 
            border: none; border-radius: 12px; z-index: 100; 
            font-weight: bold;
        }
        #bar { position: fixed; top: 0; left: 0; height: 6px; background: #ff4081; width: 0%; z-index: 200; }
    </style>
</head>
<body>
    <div id="bar"></div>
    <button id="clear-btn">Очистить</button>
    <canvas id="canvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const res = 256; 
        canvas.width = res; canvas.height = res;

        // Настройка стиля кисти
        ctx.strokeStyle = '#ff4081'; 
        ctx.lineWidth = 10; 
        ctx.lineCap = 'round'; 
        ctx.lineJoin = 'round';

        let drawing = false;
        let data = ""; 
        let lastX = 0, lastY = 0;

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            // PointerEvents работают одинаково для всех устройств
            return {
                x: Math.max(0, Math.min(255, Math.round((e.clientX - rect.left) * (res / rect.width)))),
                y: Math.max(0, Math.min(255, Math.round((e.clientY - rect.top) * (res / rect.height))))
            };
        }

        function toHex(n) { return n.toString(16).padStart(2, '0'); }

        // Универсальный обработчик начала нажатия
        canvas.addEventListener('pointerdown', (e) => {
            drawing = true;
            const {x, y} = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(x, y);
            data += "!" + toHex(x) + toHex(y);
            lastX = x; lastY = y;
            // Ставим точку сразу при нажатии
            ctx.arc(x, y, ctx.lineWidth/4, 0, Math.PI*2);
            ctx.fill();
        });

        // Универсальный обработчик движения
        canvas.addEventListener('pointermove', (e) => {
            if (!drawing) return;
            const {x, y} = getCoords(e);
            
            ctx.lineTo(x, y);
            ctx.stroke();

            if (Math.hypot(x - lastX, y - lastY) > 1) {
                data += toHex(x) + toHex(y);
                lastX = x; lastY = y;
            }

            document.getElementById('bar').style.width = (data.length / 4000 * 100) + "%";
        });

        // Универсальный обработчик конца нажатия
        window.addEventListener('pointerup', () => { drawing = false; });

        document.getElementById('clear-btn').onclick = () => {
            ctx.clearRect(0, 0, res, res);
            data = "";
            document.getElementById('bar').style.width = "0%";
        };

        tg.MainButton.setText("ОТПРАВИТЬ АНИМАЦИЮ ❤️");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            if (data.length < 5) return alert("Нарисуй что-нибудь!");
            tg.sendData(data);
        });
    </script>
</body>
</html>
