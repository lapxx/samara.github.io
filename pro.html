<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { margin: 0; padding: 0; background: #121212; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }
        
        #progress-bg { width: 100%; height: 4px; background: #333; }
        #progress-fill { height: 100%; width: 0%; background: #00e5ff; }
        
        #canvas-wrap { width: 100vw; height: 100vw; position: relative; background: #1e1e1e; }
        canvas { display: block; width: 100%; height: 100%; }
        
        .toolbar { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 10px; background: #121212; }
        .row { display: flex; align-items: center; gap: 8px; width: 100%; }
        
        /* Выбор слоев */
        .layer-tabs { display: flex; gap: 5px; flex: 1; }
        .layer-btn { background: #2a2a2a; border: 2px solid #444; color: #888; flex: 1; padding: 8px; border-radius: 8px; font-weight: bold; font-size: 14px; text-align: center; }
        .layer-btn.active { border-color: #00e5ff; color: #fff; background: #333; }
        .layer-btn.has-content { color: #ffea00; }

        .scroll-x { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .color-btn { min-width: 32px; height: 32px; border-radius: 50%; border: 2px solid #444; }
        .color-btn.active { border-color: #fff; transform: scale(1.1); }
        
        #size-slider { flex: 1; height: 30px; -webkit-appearance: none; background: #333; border-radius: 15px; outline: none; }
        #size-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #fff; border-radius: 50%; }

        .btn { background: #2a2a2a; border: none; color: white; padding: 12px; border-radius: 10px; font-weight: bold; flex: 1; font-size: 13px; }
        .btn:active { background: #444; }
    </style>
</head>
<body>
    <div id="progress-bg"><div id="progress-fill"></div></div>
    <div id="canvas-wrap"><canvas id="canvas"></canvas></div>

    <div class="toolbar">
        <!-- СЛОИ -->
        <div class="row">
            <span style="font-size: 12px;">СЛОЙ:</span>
            <div class="layer-tabs">
                <div class="layer-btn active" data-l="0">1</div>
                <div class="layer-btn" data-l="1">2</div>
                <div class="layer-btn" data-l="2">3</div>
                <div class="layer-btn" data-l="3">4</div>
            </div>
            <button class="btn" id="undo-btn" style="flex:0.5">↩️</button>
        </div>

        <div class="scroll-x" id="brush-colors">
            <div class="color-btn active" style="background: #ff4081;" data-c="0"></div>
            <div class="color-btn" style="background: #00e5ff;" data-c="1"></div>
            <div class="color-btn" style="background: #ffea00;" data-c="2"></div>
            <div class="color-btn" style="background: #b388ff;" data-c="3"></div>
            <div class="color-btn" style="background: #ffffff;" data-c="4"></div>
        </div>

        <div class="row">
            <input type="range" id="size-slider" min="2" max="40" value="10">
            <button class="btn" id="clear-btn" style="background:#b71c1c; flex:0.4">🗑️</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fill = document.getElementById('progress-fill');
        
        const COLORS = ['#ff4081', '#00e5ff', '#ffea00', '#b388ff', '#ffffff'];
        let curC = 0, curS = 10, curL = 0;
        let viewSize = window.innerWidth;
        canvas.width = viewSize; canvas.height = viewSize;

        // layers = [ [], [], [], [] ] - 4 блока синхронного рисования
        let layers = [[], [], [], []]; 
        let isDrawing = false;
        const MAX_BYTES = 3900;

        // UI слоев
        document.querySelectorAll('.layer-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelector('.layer-btn.active').classList.remove('active');
                e.target.classList.add('active');
                curL = parseInt(e.target.dataset.l);
            };
        });

        document.querySelectorAll('#brush-colors .color-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelector('#brush-colors .active').classList.remove('active');
                e.target.classList.add('active');
                curC = parseInt(e.target.dataset.c);
            };
        });

        document.getElementById('size-slider').oninput = (e) => { curS = parseInt(e.target.value); };
        document.getElementById('undo-btn').onclick = () => { layers[curL].pop(); redraw(); };
        document.getElementById('clear-btn').onclick = () => { layers[curL] = []; redraw(); };

        function redraw() {
            ctx.clearRect(0, 0, viewSize, viewSize);
            layers.forEach((layer, idx) => {
                const btn = document.querySelector(`.layer-btn[data-l="${idx}"]`);
                if (layer.length > 0) btn.classList.add('has-content');
                else btn.classList.remove('has-content');

                layer.forEach(p => {
                    ctx.strokeStyle = COLORS[p.c];
                    ctx.lineWidth = p.s;
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.beginPath();
                    ctx.moveTo(p.pts[0].x, p.pts[0].y);
                    p.pts.forEach(pt => ctx.lineTo(pt.x, pt.y));
                    ctx.stroke();
                });
            });
            updateLimit();
        }

        function toHex(n) { return Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2, '0'); }

        function updateLimit() {
            let str = "0|";
            layers.forEach(l => {
                l.forEach(p => { str += "~" + p.c + toHex(p.s) + "0000".repeat(p.pts.length); });
                str += "|";
            });
            fill.style.width = (str.length / MAX_BYTES * 100) + '%';
            return str.length;
        }

        canvas.addEventListener('touchstart', (e) => {
            if (updateLimit() >= MAX_BYTES) return;
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            let x = e.touches[0].clientX - rect.left, y = e.touches[0].clientY - rect.top;
            layers[curL].push({ c: curC, s: curS, pts: [{x, y}] });
            redraw();
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing || updateLimit() >= MAX_BYTES) return;
            const rect = canvas.getBoundingClientRect();
            let x = e.touches[0].clientX - rect.left, y = e.touches[0].clientY - rect.top;
            let currLayer = layers[curL];
            let currPath = currLayer[currLayer.length-1];
            let last = currPath.pts[currPath.pts.length - 1];
            if (Math.hypot(x-last.x, y-last.y) > 4) {
                currPath.pts.push({x, y});
                redraw();
            }
        });

        window.addEventListener('touchend', () => isDrawing = false);

        tg.MainButton.setText("ОТПРАВИТЬ ШЕДЕВР ❤️");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            let data = "0|"; // BG (пока всегда 0)
            layers.forEach(layer => {
                layer.forEach(p => {
                    data += "~" + p.c + toHex(p.s);
                    p.pts.forEach(pt => {
                        data += toHex((pt.x / viewSize) * 255) + toHex((pt.y / viewSize) * 255);
                    });
                });
                data += "|";
            });
            tg.sendData(data);
        });
    </script>
</body>
</html>
