<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { margin: 0; padding: 0; background: #121212; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; color: white; }
        
        #progress-bg { width: 100%; height: 4px; background: #333; }
        #progress-fill { height: 100%; width: 0%; background: #00e5ff; transition: width 0.1s; }
        
        #canvas-wrap { width: 100vw; height: 100vw; position: relative; background: #1e1e1e; }
        canvas { display: block; width: 100%; height: 100%; }
        
        .toolbar { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #121212; }
        .row { display: flex; align-items: center; gap: 8px; width: 100%; }
        
        .scroll-x { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; }
        .color-btn { min-width: 32px; height: 32px; border-radius: 50%; border: 2px solid #444; }
        .color-btn.active { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 10px currentColor; }
        
        #size-slider { flex: 1; height: 30px; -webkit-appearance: none; background: #333; border-radius: 15px; outline: none; }
        #size-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #fff; border-radius: 50%; }
        
        .bg-btn { min-width: 32px; height: 32px; border: 1px solid #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .bg-btn.active { border-color: #00e5ff; }

        .btn { background: #2a2a2a; border: none; color: white; padding: 10px; border-radius: 10px; font-weight: bold; flex: 1; font-size: 12px; }
        .btn:active { background: #444; }
        #layer-btn { background: #6200ea; box-shadow: 0 0 10px rgba(98, 0, 234, 0.5); }
    </style>
</head>
<body>
    <div id="progress-bg"><div id="progress-fill"></div></div>
    <div id="canvas-wrap"><canvas id="canvas"></canvas></div>

    <div class="toolbar">
        <div class="scroll-x" id="brush-colors">
            <div class="color-btn active" style="background: #ff4081;" data-c="0"></div>
            <div class="color-btn" style="background: #00e5ff;" data-c="1"></div>
            <div class="color-btn" style="background: #ffea00;" data-c="2"></div>
            <div class="color-btn" style="background: #b388ff;" data-c="3"></div>
            <div class="color-btn" style="background: #00ff00;" data-c="4"></div>
            <div class="color-btn" style="background: #ffffff;" data-c="5"></div>
        </div>

        <div class="row">
            <input type="range" id="size-slider" min="2" max="40" value="10">
            <div class="scroll-x" id="bg-colors">
                <div class="bg-btn active" style="background: #1e1e1e;" data-bg="0">⬛</div>
                <div class="bg-btn" style="background: #ffffff;" data-bg="1">⬜</div>
                <div class="bg-btn" style="background: #311b92;" data-bg="2">🟦</div>
            </div>
        </div>

        <div class="row">
            <button class="btn" id="layer-btn">✨ Слой (Синхронно)</button>
            <button class="btn" id="undo-btn">↩️ Назад</button>
            <button class="btn" id="clear-btn" style="background:#b71c1c">🗑️ Стереть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fill = document.getElementById('progress-fill');
        
        const COLORS = ['#ff4081', '#00e5ff', '#ffea00', '#b388ff', '#00ff00', '#ffffff'];
        const BG_COLORS = ['#1e1e1e', '#ffffff', '#311b92'];

        let curC = 0, curS = 10, curBG = 0;
        let viewSize = window.innerWidth;
        canvas.width = viewSize; canvas.height = viewSize;

        // СТРУКТУРА: layers = [ [block1_paths], [block2_paths] ]
        let layers = [[]]; 
        let isDrawing = false;
        const MAX_BYTES = 3800;

        // Настройка UI
        document.querySelectorAll('#brush-colors .color-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelector('#brush-colors .active').classList.remove('active');
                e.target.classList.add('active');
                curC = parseInt(e.target.dataset.c);
            };
        });

        document.querySelectorAll('#bg-colors .bg-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelector('#bg-colors .active').classList.remove('active');
                e.target.classList.add('active');
                curBG = parseInt(e.target.dataset.bg);
                document.getElementById('canvas-wrap').style.background = BG_COLORS[curBG];
                redraw();
            };
        });

        document.getElementById('size-slider').oninput = (e) => { curS = parseInt(e.target.value); };
        
        document.getElementById('layer-btn').onclick = () => {
            if (layers[layers.length-1].length > 0) {
                layers.push([]);
                tg.HapticFeedback.notificationOccurred('success');
                redraw();
            }
        };

        document.getElementById('undo-btn').onclick = () => {
            let currLayer = layers[layers.length-1];
            if (currLayer.length > 0) currLayer.pop();
            else if (layers.length > 1) layers.pop();
            redraw();
        };

        document.getElementById('clear-btn').onclick = () => { layers = [[]]; redraw(); };

        function toHex(n) { return Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2, '0'); }

        function redraw() {
            ctx.clearRect(0, 0, viewSize, viewSize);
            layers.forEach((layer, lIdx) => {
                layer.forEach(p => {
                    ctx.strokeStyle = COLORS[p.c];
                    ctx.lineWidth = p.s;
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.beginPath();
                    ctx.moveTo(p.pts[0].x, p.pts[0].y);
                    p.pts.forEach(pt => ctx.lineTo(pt.x, pt.y));
                    ctx.stroke();
                });
            });
            updateLimit();
        }

        function updateLimit() {
            let str = "0|";
            layers.forEach(l => {
                l.forEach(p => { str += "~" + p.c + toHex(p.s) + "0000".repeat(p.pts.length); });
                str += "|";
            });
            fill.style.width = (str.length / MAX_BYTES * 100) + '%';
            return str.length;
        }

        canvas.addEventListener('touchstart', (e) => {
            if (updateLimit() >= MAX_BYTES) return;
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const t = e.touches[0];
            let x = t.clientX - rect.left, y = t.clientY - rect.top;
            layers[layers.length-1].push({ c: curC, s: curS, pts: [{x, y}] });
            redraw();
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing || updateLimit() >= MAX_BYTES) return;
            const rect = canvas.getBoundingClientRect();
            const t = e.touches[0];
            let x = t.clientX - rect.left, y = t.clientY - rect.top;
            let currLayer = layers[layers.length-1];
            let currPath = currLayer[currLayer.length-1];
            let last = currPath.pts[currPath.pts.length - 1];
            if (Math.hypot(x-last.x, y-last.y) > 4) {
                currPath.pts.push({x, y});
                redraw();
            }
        });

        window.addEventListener('touchend', () => isDrawing = false);

        tg.MainButton.setText("ОТПРАВИТЬ СЛОЯМИ ❤️");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            let data = curBG + "|";
            layers.forEach(layer => {
                layer.forEach(p => {
                    data += "~" + p.c + toHex(p.s);
                    p.pts.forEach(pt => {
                        data += toHex((pt.x / viewSize) * 255) + toHex((pt.y / viewSize) * 255);
                    });
                });
                data += "|"; // Разделитель синхронных блоков
            });
            tg.sendData(data);
        });
    </script>
</body>
</html>
