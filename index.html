<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; overflow: hidden; touch-action: none; }
        canvas { width: 100vw; height: 100vw; display: block; background: #fdfdfd; }
        #clear-btn { position: fixed; top: 10px; right: 10px; padding: 10px; background: #ff4444; color: #fff; border: none; border-radius: 8px; z-index: 10; font-family: sans-serif; }
    </style>
</head>
<body>
    <button id="clear-btn">Очистить</button>
    <canvas id="canvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Внутреннее разрешение для точности
        canvas.width = 500;
        canvas.height = 500;

        ctx.strokeStyle = '#ff4081';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';

        let paths = []; // Массив всех линий
        let currentPath = []; 
        let drawing = false;

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return {
                x: Math.round((clientX - rect.left) * (canvas.width / rect.width)),
                y: Math.round((clientY - rect.top) * (canvas.height / rect.height))
            };
        }

        canvas.addEventListener('touchstart', (e) => {
            drawing = true;
            const {x, y} = getCoords(e);
            currentPath = [x, y];
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!drawing) return;
            const {x, y} = getCoords(e);
            currentPath.push(x, y);
            ctx.lineTo(x, y);
            ctx.stroke();
        });

        canvas.addEventListener('touchend', () => {
            drawing = false;
            if (currentPath.length > 0) {
                paths.push(currentPath.join(',')); // Сохраняем линию как строку "x1,y1,x2,y2..."
            }
        });

        document.getElementById('clear-btn').onclick = () => {
            ctx.clearRect(0, 0, 500, 500);
            paths = [];
        };

        tg.MainButton.setText("ОТПРАВИТЬ ❤️");
        tg.MainButton.show();
        
        tg.MainButton.onClick(() => {
            // Формат: Линия1;Линия2;Линия3
            const data = paths.join(';'); 
            if (data.length > 4000) {
                alert("Рисунок слишком длинный! Нарисуй чуть проще.");
            } else {
                tg.sendData(data);
            }
        });
    </script>
</body>
</html>
