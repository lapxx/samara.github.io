<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { margin: 0; padding: 0; background: #ffffff; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vw; background: #ffffff; touch-action: none; }
        #clear-btn { position: fixed; top: 15px; right: 15px; padding: 12px 20px; background: #ff4444; color: #fff; border: none; border-radius: 12px; z-index: 100; font-weight: bold; }
        #status { position: fixed; bottom: 85px; width: 100%; text-align: center; color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <button id="clear-btn">Очистить</button>
    <div id="status">Нарисуй что-нибудь ❤️</div>
    <canvas id="canvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const res = 500;
        canvas.width = res; canvas.height = res;

        // Настройки кисти
        ctx.strokeStyle = '#ff4081'; 
        ctx.lineWidth = 12; 
        ctx.lineCap = 'round'; 
        ctx.lineJoin = 'round';

        let drawing = false;
        let strokes = []; 
        let currentStroke = "";

        // Сжатие: число 0-500 в 1 символ
        function encodeNum(num) { return String.fromCharCode(num + 32); }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            return {
                x: Math.round((t.clientX - rect.left) * (res / rect.width)),
                y: Math.round((t.clientY - rect.top) * (res / rect.height))
            };
        }

        // НАЧАЛО РИСОВАНИЯ
        function start(e) {
            drawing = true;
            const {x, y} = getCoords(e);
            
            // Визуал для тебя
            ctx.beginPath();
            ctx.moveTo(x, y);
            
            // Данные для бота
            currentStroke = encodeNum(x) + encodeNum(y);
            
            if (e.cancelable) e.preventDefault();
        }

        // ПРОЦЕСС РИСОВАНИЯ
        function move(e) {
            if (!drawing) return;
            const {x, y} = getCoords(e);

            // Визуал: рисуем линию на экране прямо сейчас
            ctx.lineTo(x, y);
            ctx.stroke();

            // Данные: записываем координаты в строку
            currentStroke += encodeNum(x) + encodeNum(y);
            
            if (e.cancelable) e.preventDefault();
        }

        // КОНЕЦ МАЗКА
        function stop() {
            if (!drawing) return;
            drawing = false;
            if (currentStroke.length > 2) {
                strokes.push(currentStroke);
            }
        }

        // Слушатели тача
        canvas.addEventListener('touchstart', start, {passive: false});
        canvas.addEventListener('touchmove', move, {passive: false});
        canvas.addEventListener('touchend', stop);

        // Кнопка очистки
        document.getElementById('clear-btn').onclick = () => {
            ctx.clearRect(0, 0, res, res);
            strokes = [];
            document.getElementById('status').innerText = "Очищено!";
        };

        tg.MainButton.setText("ОТПРАВИТЬ АНИМАЦИЮ ❤️");
        tg.MainButton.show();
        
        tg.MainButton.onClick(() => {
            if (strokes.length === 0) return alert("Нарисуй что-нибудь!");
            const data = strokes.join('|');
            // Проверка лимита 4КБ (на всякий случай)
            if (data.length > 4000) {
                alert("Рисунок слишком сложный для анимации!");
            } else {
                tg.sendData(data);
            }
        });
    </script>
</body>
</html>
