<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #ffffff; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { 
            display: block; 
            background: #ffffff; 
            width: 100vw; 
            height: 100vw; 
            touch-action: none;
            -webkit-user-select: none;
        }
        #clear-btn { 
            position: fixed; top: 15px; right: 15px; 
            padding: 12px 24px; background: #ff4444; color: #fff; 
            border: none; border-radius: 12px; z-index: 100; 
            font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #status { position: fixed; bottom: 85px; width: 100%; text-align: center; color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <button id="clear-btn">Очистить</button>
    <div id="status">Нарисуй что-нибудь ❤️</div>
    <canvas id="canvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Фиксированное разрешение для отправки боту
        const res = 500;
        canvas.width = res;
        canvas.height = res;

        // Настройки кисти
        ctx.strokeStyle = '#ff4081';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        let drawing = false;
        let paths = []; 
        let currentPath = [];

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            // Поддержка и тача, и мышки
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            return {
                x: Math.round((clientX - rect.left) * (res / rect.width)),
                y: Math.round((clientY - rect.top) * (res / rect.height))
            };
        }

        function start(e) {
            drawing = true;
            const {x, y} = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(x, y);
            currentPath = [x, y];
            e.preventDefault();
        }

        function move(e) {
            if (!drawing) return;
            const {x, y} = getCoords(e);
            
            ctx.lineTo(x, y);
            ctx.stroke();
            
            currentPath.push(x, y);
            e.preventDefault();
        }

        function stop() {
            if (!drawing) return;
            drawing = false;
            if (currentPath.length > 0) {
                paths.push(currentPath.join(','));
            }
        }

        // События тача (телефон)
        canvas.addEventListener('touchstart', start, {passive: false});
        canvas.addEventListener('touchmove', move, {passive: false});
        canvas.addEventListener('touchend', stop);

        // События мышки (ПК)
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);

        // Кнопка очистки
        document.getElementById('clear-btn').onclick = () => {
            ctx.clearRect(0, 0, res, res);
            paths = [];
            document.getElementById('status').innerText = "Очищено!";
        };

        // Главная кнопка ТГ
        tg.MainButton.setText("ОТПРАВИТЬ ❤️");
        tg.MainButton.show();
        
        tg.MainButton.onClick(() => {
            const data = paths.join(';');
            if (paths.length === 0) {
                alert("Сначала нарисуй что-нибудь!");
                return;
            }
            // Отправляем строку координат
            tg.sendData(data);
        });
    </script>
</body>
</html>
