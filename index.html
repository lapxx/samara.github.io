<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vw; background: #fff; }
        #clear-btn { position: fixed; top: 15px; right: 15px; padding: 12px; background: #f44; color: #fff; border: none; border-radius: 10px; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>
    <button id="clear-btn">Очистить</button>
    <canvas id="canvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const res = 500;
        canvas.width = res; canvas.height = res;

        ctx.strokeStyle = '#ff4081'; ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        let drawing = false;
        let strokes = []; // Список всех мазков
        let currentStroke = "";

        // Функция сжатия: превращает число в 1 символ
        function encodeNum(num) { return String.fromCharCode(num + 32); }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            return {
                x: Math.round((t.clientX - rect.left) * (res / rect.width)),
                y: Math.round((t.clientY - rect.top) * (res / rect.height))
            };
        }

        canvas.addEventListener('touchstart', (e) => {
            drawing = true;
            const {x, y} = getCoords(e);
            ctx.beginPath(); ctx.moveTo(x, y);
            currentStroke = encodeNum(x) + encodeNum(y);
            e.preventDefault();
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            if (!drawing) return;
            const {x, y} = getCoords(e);
            ctx.lineTo(x, y); ctx.stroke();
            currentStroke += encodeNum(x) + encodeNum(y);
            e.preventDefault();
        }, {passive: false});

        canvas.addEventListener('touchend', () => {
            if (!drawing) return;
            drawing = false;
            strokes.push(currentStroke);
        });

        document.getElementById('clear-btn').onclick = () => {
            ctx.clearRect(0, 0, res, res);
            strokes = [];
        };

        tg.MainButton.setText("ОТПРАВИТЬ АНИМАЦИЮ ❤️");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            if (strokes.length === 0) return alert("Нарисуй что-нибудь!");
            // Склеиваем мазки через разделитель "|"
            const data = strokes.join('|');
            tg.sendData(data);
        });
    </script>
</body>
</html>
